                            <svg class="icon-check" xmlns="http://www.w3.org/2000/svg" height="24"

                            <svg class="icon-check" xmlns="http://www.w3.org/2000/svg" height="24"

                    <span class="settings-row-label" data-i18n="useWallpaperColor">Use wallpaper color</span>
                    <label class="md3-switch">
                        <input type="checkbox" id="useWallpaperColorToggle" />
                        <span class="switch-track">
                            <span class="switch-thumb"></span>
                        </span>
                    </label>
                </div>

            </div>

            <div class="settings-group-card">
                <div class="group-header">
                    <div class="group-title-wrapper">
                        <h3 class="settings-group-title" data-i18n="weatherTitle">Weather</h3>
                    </div>
                    <label class="md3-switch">
                        <input type="checkbox" id="weatherToggle" checked />
                        <span class="switch-track">
                            <span class="switch-thumb"></span>
                        </span>
                    </label>
                </div>

                <div class="expandable-content compact-gap" id="weatherSettingsBlock">
                    <div class="input-with-action-row">
                        <div class="md3-outlined-text-field" id="cityInputWrapper">
                            <input type="text" id="weatherCityInput" class="md3-input" placeholder=" "
                                autocomplete="off" />
                            <label for="weatherCityInput" class="md3-label" data-i18n="weatherCityLabel">City
                                name</label>

                            <button type="button" class="icon-btn clear-input-btn" id="clearCityBtn"
                                aria-label="Clear city">
                                <svg class="clear-icon" xmlns="http://www.w3.org/2000/svg" height="24"
                                    viewBox="0 -960 960 960" width="24" fill="currentColor">
                                    <path
                                        d="m480-424 116 116q11 11 28 11t28-11 11-28-11-28L536-480l116-116q11-11 11-28t-11-28-28-11-28 11L480-536 364-652q-11-11-28-11t-28 11-11 28 11 28l116 116-116 116q-11 11-11 28t11 28 28 11 28-11zm0 344q-83 0-156-31.5T197-197t-85.5-127T80-480t31.5-156T197-763t127-85.5T480-880t156 31.5T763-763t85.5 127T880-480t-31.5 156T763-197t-127 85.5T480-80m0-80q134 0 227-93t93-227-93-227-227-93-227 93-93 227 93 227 227 93m0-320" />

                            </svg>
                        </div>

                        <button type="button" class="custom-shape-btn" id="searchCityBtn" aria-label="Search city">
                            <svg class="background-shape-svg" width="380" height="380" viewBox="0 0 380 380"

                                <path

                            </svg>
                            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" height="24"
                                viewBox="0 -960 960 960" width="24" fill="currentColor">
                                <path
                                    d="M402-402 143-507q-13-5-19-15.5t-6-21.5 6.5-21.5T144-581l614-228q12-5 23-2t19 11 11 19-2 23L581-144q-5 13-15.5 19.5T544-118t-21.5-6-15.5-19zm140 134 162-436-436 162 196 78zm-78-196" />
                            </svg>
                        </button>
                    </div>

                    <hr class="settings-divider" />
                    <div class="md3-radio-group">
                        <label class="md3-radio">
                            <span class="radio-text">Celsius (°C)</span>
                            <input type="radio" name="tempUnit" value="C" checked />
                            <div class="radio-outer">
                                <div class="radio-inner"></div>
                            </div>
                        </label>

                        <label class="md3-radio">
                            <span class="radio-text">Fahrenheit (°F)</span>
                            <input type="radio" name="tempUnit" value="F" />
                            <div class="radio-outer">
                                <div class="radio-inner"></div>
                            </div>
                        </label>
                    </div>
                </div>

            </div>

            <div class="settings-group-card">
                <div class="group-header">
                    <div class="group-title-wrapper">
                        <h3 class="settings-group-title" data-i18n="shortcutsTitle">Shortcuts</h3>
                    </div>
                    <label class="md3-switch">
                        <input type="checkbox" id="shortcutsToggle" checked />
                        <span class="switch-track">
                            <span class="switch-thumb"></span>
                        </span>
                    </label>
                </div>

                <div class="expandable-content compact-gap" id="shortcutsSettingsBlock">
                    <div class="md3-outlined-select-wrapper">
                        <select id="shortcutsRowsSelect" class="md3-outlined-select" aria-label="Shortcuts Rows">
                            <option value="1" data-i18n="rows1">1 Row</option>
                            <option value="2" data-i18n="rows2">2 Rows</option>
                            <option value="3" data-i18n="rows3">3 Rows</option>
                            <option value="4" data-i18n="rows4">4 Rows</option>
                        </select>
                        <label for="shortcutsRowsSelect" class="md3-select-label" data-i18n="shortcutsRowsLabel">Rows</label>
                        <svg class="dropdown-icon" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor"><path d="M459-381 314-526q-3-3-4.5-6.5T308-540q0-8 5.5-14t14.5-6h304q9 0 14.5 6t5.5 14q0 2-6 14L501-381q-5 5-10 7t-11 2-11-2-10-7"/></svg>
                    </div>
                </div>
            </div>
    </aside>

    <div id="warningModal" class="md3-dialog-overlay">
        <div class="md3-dialog">
            <h2 id="warning-modal-title" class="md3-dialog-title"></h2>
            <div class="md3-dialog-content">
                <p id="warning-modal-message" class="md3-dialog-text"></p>
            </div>

            <div class="md3-dialog-actions">
                <button id="warning-btn-cancel" class="md3-text-btn"></button>
                <button id="warning-btn-confirm" class="md3-filled-btn"></button>
            </div>
        </div>
    </div>

    <div id="shortcutModal" class="md3-dialog-overlay">
        <div class="md3-dialog">
            <h2 id="shortcut-modal-title" class="md3-dialog-title">Add</h2>
            <div class="md3-dialog-content">
                <form id="shortcutForm" class="shortcut-form">

                        <label for="shortcutName" class="md3-filled-label">Name</label>
                        <div class="md3-filled-indicator"></div>
                    </div>

                    <div class="md3-filled-input-wrapper">
                        <input type="url" id="shortcutUrl" class="md3-filled-input" placeholder=" " required />
                        <label for="shortcutUrl" class="md3-filled-label">URL</label>
                        <button type="button" class="clear-input-btn" tabindex="-1">

                        <svg class="error-icon-svg" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor"><path d="M508.5-291.5Q520-303 520-320t-11.5-28.5T480-360t-28.5 11.5T440-320t11.5 28.5T480-280t28.5-11.5m0-160Q520-463 520-480v-160q0-17-11.5-28.5T480-680t-28.5 11.5T440-640v160q0 17 11.5 28.5T480-440t28.5-11.5M480-80q-83 0-156-31.5T197-197t-85.5-127T80-480t31.5-156T197-763t127-85.5T480-880t156 31.5T763-763t85.5 127T880-480t-31.5 156T763-197t-127 85.5T480-80"/></svg>
                        <div class="md3-filled-indicator"></div>
                    </div>

                    <div class="md3-filled-input-wrapper">
                        <input type="url" id="shortcutIconUrl" class="md3-filled-input" placeholder=" " />
                        <label for="shortcutIconUrl" class="md3-filled-label">Icon URL (optional)</label>
                        <button type="button" class="clear-input-btn" tabindex="-1">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor"><path d="m480-424 116 116q11 11 28 11t28-11 11-28-11-28L536-480l116-116q11-11 11-28t-11-28-28-11-28 11L480-536 364-652q-11-11-28-11t-28 11-11 28 11 28l116 116-116 116q-11 11-11 28t11 28 28 11 28-11zm0 344q-83 0-156-31.5T197-197t-85.5-127T80-480t31.5-156T197-763t127-85.5T480-880t156 31.5T763-763t85.5 127T880-480t-31.5 156T763-197t-127 85.5T480-80m0-80q134 0 227-93t93-227-93-227-227-93-227 93-93 227 93 227 227 93m0-320"/></svg>
                        </button>
                        <svg class="error-icon-svg" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor"><path d="M508.5-291.5Q520-303 520-320t-11.5-28.5T480-360t-28.5 11.5T440-320t11.5 28.5T480-280t28.5-11.5m0-160Q520-463 520-480v-160q0-17-11.5-28.5T480-680t-28.5 11.5T440-640v160q0 17 11.5 28.5T480-440t28.5-11.5M480-80q-83 0-156-31.5T197-197t-85.5-127T80-480t31.5-156T197-763t127-85.5T480-880t156 31.5T763-763t85.5 127T880-480t-31.5 156T763-197t-127 85.5T480-80"/></svg>
                        <div class="md3-filled-indicator"></div>
                    </div>
                </form>
            </div>

            <div class="md3-dialog-actions">
                <button type="button" id="shortcut-btn-cancel" class="md3-text-btn">Cancel</button>
                <button type="submit" form="shortcutForm" id="shortcut-btn-confirm" class="md3-filled-btn">Save</button>
            </div>
        </div>
    </div>
