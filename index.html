<body>
    <div class="container">
        <div id="displayWidget" class="display-widget">
            <div class="clock-expressive">
                <div class="time-card hour-card">
                    <span id="hourDisplay">00</span>
                </div>
                <div class="time-separator">:</div>
                <div class="time-card minute-card">
                    <span id="minuteDisplay">00</span>
                </div>
            </div>
        </div>

        <form id="searchForm" action="https://www.google.com/search" method="GET" class="search-bar">
            <div class="search-engine-selector">
                <button type="button" id="engineBtn" class="engine-circle-btn">
                    <img id="currentEngineIcon" src="assets/search-engines/google.svg" alt="Search Engine" />
                </button>

                <div id="engineDropdown" class="dropdown-menu">
                    <div class="dropdown-item" data-engine="google">
                        <img src="assets/search-engines/google.svg" alt="Google" />
                        <span>Google</span>
                    </div>
                    <div class="dropdown-item" data-engine="bing">
                        <img src="assets/search-engines/bing.svg" alt="Bing" />
                        <span>Bing</span>
                    </div>
                    <div class="dropdown-item" data-engine="duck">
                        <img src="assets/search-engines/ddg.svg" alt="DuckDuckGo" />
                        <span>DuckDuckGo</span>
                    </div>
                    <div class="dropdown-item" data-engine="brave">
                        <img src="assets/search-engines/brave.svg" alt="Brave" />
                        <span>Brave Search</span>
                    </div>
                    <div class="dropdown-item" data-engine="ecosia">
                        <img src="assets/search-engines/ecosia.svg" alt="Ecosia Search" />
                        <span>Ecosia Search</span>
                    </div>
                    <div class="dropdown-item" data-engine="startpage">
                        <img src="assets/search-engines/startpg.svg" alt="Start Page" />
                        <span>Start Page</span>
                    </div>
                    <div class="dropdown-item" data-engine="kagi">
                        <img src="assets/search-engines/kagi.svg" alt="Kagi" />
                        <span>Kagi</span>
                    </div>
                </div>
            </div>

            <input type="text" name="q" id="searchInput" placeholder="Search the web" autocomplete="off"
                data-i18n="searchPlaceholder" />

            <div class="search-actions">
                <button type="button" id="voiceSearchBtn" class="action-btn voice-btn" title="Voice search"
                    aria-label="Voice search">
