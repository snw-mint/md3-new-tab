name: 🟢 Feature Request
description: Suggest a new feature or improvement
title: '[Feature]: '
labels: ['feature']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like to see?
      placeholder: 'Describe your idea briefly...'
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why would this feature be useful? What problem does it solve?
      placeholder: 'Explain the use case or problem this would solve...'
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Details (Optional)
      placeholder: 'Any extra context, mockups, or examples?'
